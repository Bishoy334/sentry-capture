                - paragraph [ref=e366]:
                  - text: If you’re a power user who regularly captures, edits, and shares screenshots,
                  - strong [ref=e367]: CleanshotX
                  - text: is the tool for you. It combines a wide range of features, from scrolling screenshots, GIFs and Video creation, making it perfect for users who need versatility.
                - paragraph [ref=e368]:
                  - strong [ref=e369]: Features
                  - text: ":"
                - list [ref=e370]:
                  - listitem [ref=e371]:
                    - paragraph [ref=e372]:
                      - strong [ref=e373]: Capture Options
                      - text: ": CleanshotX supports scrolling screenshots, window captures, merging multiple screenshots, and repeated area captures, making it great for in-depth projects."
                    - paragraph [ref=e374]: (I personally use the 'repeated area captures' feature for Toolfolio Screenshots)
                  - listitem [ref=e375]:
                    - paragraph [ref=e376]:
                      - strong [ref=e377]: Editing Capabilities
                      - text: ": With seven text styles, multiple arrow style options, spotlight effects, and various blur effects, CleanshotX is fantastic for annotation. You can also crop, add padding, and customize the backgrounds of your screenshots."
                  - listitem [ref=e378]:
                    - paragraph [ref=e379]:
                      - strong [ref=e380]: Text Recognition (OCR)
                      - text: ": Need to extract text from images? CleanshotX has you covered with its Optical Character Recognition ("
                      - strong [ref=e381]: OCR)
                      - text: functionality.
                    - paragraph [ref=e382]: It's one of those tools you didn't know you needed till you tried it
                - paragraph [ref=e383]:
                  - strong [ref=e384]: Cloud Sharing
                  - text: ": For easy collaboration, CleanshotX allows cloud storage and sharing with a single click. (on monthly plan)"
                - paragraph [ref=e385]:
                  - emphasis [ref=e386]:
                    - strong [ref=e387]: What Could Be Better
                    - text: ": While nearly perfect, CleanshotX lacks a built-in screen ruler and color picker, which are handy for design-focused users, something offered in the next screenshot tool mentioned, Shottr."
                - paragraph [ref=e388]:
                  - strong [ref=e389]: Pricing
                  - text: ":"
                - list [ref=e390]:
                  - listitem [ref=e391]:
                    - paragraph [ref=e392]: "One-time purchase: $29"
                  - listitem [ref=e393]:
                    - paragraph [ref=e394]: "Subscription: $8/month or $79/year for unlimited cloud storage and advanced features."
